name: macropilot_installer
description: "键鼠宏助手 安装程序（Flutter 重构版，替代 Inno Setup）。"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  fluent_ui: ^4.9.0
  flutter_acrylic: ^1.1.4
  file_picker: ^8.1.4
  window_manager: ^0.4.3
  archive: ^4.0.2
  path: ^1.9.0

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/payload/app.zip
